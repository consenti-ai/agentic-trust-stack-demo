name: Build and push SecretVM image

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: consenti-server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/blocksee-sales-agent:latest
          platforms: linux/amd64

      - name: Update docker-compose-secretvm.yaml with real digest
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/blocksee-sales-agent@${{ steps.push.outputs.digest }}"
          sed -i "s|image: .*blocksee-sales-agent.*|image: $IMAGE|" docker-compose-secretvm.yaml
          echo "Pinned image: $IMAGE"

      - name: Commit updated compose file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose-secretvm.yaml
          git diff --staged --quiet || git commit -m "Update docker-compose-secretvm.yaml with built image digest"
          git push
