name: Build and push SecretVM image

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/build-push-action's `tags` input needs newline-separated
      # values, not comma-separated — comma-joining silently produced a
      # single malformed tag and only :latest ever got pushed (confirmed:
      # v1.1.0 tag push succeeded but never appeared in GHCR). Multiline
      # GITHUB_OUTPUT requires the heredoc-delimiter form.
      - name: Determine image tags
        id: meta
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/${{ github.repository_owner }}/blocksee-sales-agent:latest"
            if [[ "${{ github.ref_type }}" == "tag" ]]; then
              echo "ghcr.io/${{ github.repository_owner }}/blocksee-sales-agent:${{ github.ref_name }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: consenti-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64

      # Only auto-commit the digest back on branch pushes — a tag ref is
      # checked out detached, so there's no branch to push a commit to.
      - name: Update docker-compose-secretvm.yaml with real digest
        if: github.ref_type == 'branch'
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/blocksee-sales-agent@${{ steps.push.outputs.digest }}"
          sed -i "s|image: .*blocksee-sales-agent.*|image: $IMAGE|" docker-compose-secretvm.yaml
          echo "Pinned image: $IMAGE"

      - name: Commit updated compose file
        if: github.ref_type == 'branch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose-secretvm.yaml
          git diff --staged --quiet || git commit -m "Update docker-compose-secretvm.yaml with built image digest"
          git push
