# Deploy via the SecretVM dashboard, or CLI:
#   secretvm-cli vm create -n <vm-name> -t small -s \
#     -d docker-compose-secretvm.yaml -e .env.secretvm
#
# Requires uploading secretvm-files/additional-files.tar in the "Additional
# Files" field — it unpacks to ./usr/dynamic-config.yml, which Traefik mounts
# below as its routing + TLS config.
#
# History:
#  1. An earlier version put TLS config in a top-level `configs:` block,
#     which crashed the SecretVM dashboard's compose parser ("r.get is not
#     a function").
#  2. Removing Traefik entirely "fixed" that error but left nothing
#     listening on 443 — confirmed the assigned domain resolves, but SecretVM
#     does NOT auto-proxy arbitrary container ports (only its own attestation
#     API on :29343 is externally reachable by default).
#  3. Re-adding Traefik with `--providers.docker=true` (dynamic discovery via
#     the Docker socket) resulted in the VM's compose runner silently
#     dropping the traefik service entirely — logs showed only the `app`
#     image ever being pulled/created. Best explanation: SecretVM's backend
#     strips services that mount /var/run/docker.sock (a known container-
#     escape vector), silently rather than with an error.
#  4. This version configures Traefik statically instead — no Docker
#     provider, no socket mount, routing defined in a plain file (delivered
#     via the tar upload) that points directly at `app:3000` over the
#     internal compose network.

version: '3'
services:
  app:
    image: ghcr.io/consenti-ai/blocksee-sales-agent@sha256:b8e1b7d9d88e31380f8748cf8c157d7f631f3ebce5177d0b5122d4f72746a360
    env_file:
      - .env.secretvm
    networks:
      - appnet
  traefik:
    image: traefik:v2.10
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.options=default@file
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - /mnt/secure/cert:/certs:ro
      - ./usr/dynamic-config.yml:/etc/traefik/dynamic/dynamic-config.yml:ro
    networks:
      - appnet
networks:
  appnet:
    driver: bridge
