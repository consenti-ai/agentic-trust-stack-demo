version: '3'
services:
  app:
    image: ghcr.io/consenti-ai/blocksee-sales-agent@sha256:1dc3b30201a1f495f10ce803428a860b1c5733b862955363b37065f4e511eaa6
    env_file:
      - .env.secretvm
    networks:
      - appnet
  traefik:
    image: traefik:v2.10
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.options=default@file
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - /mnt/secure/cert:/certs:ro
      - ./usr/dynamic-config.yml:/etc/traefik/dynamic/dynamic-config.yml:ro
    networks:
      - appnet
networks:
  appnet:
    driver: bridge
