version: '3'
services:
  app:
    image: ghcr.io/consenti-ai/blocksee-sales-agent@sha256:20f6f7c5b4fc588e9d675a4f87e2a2f8d888e66b9faa7dfff6fd4561d086af4d
    env_file:
      - .env.secretvm
    networks:
      - appnet
  traefik:
    image: traefik:v2.10
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.options=default@file
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - /mnt/secure/cert:/certs:ro
      - ./usr/dynamic-config.yml:/etc/traefik/dynamic/dynamic-config.yml:ro
    networks:
      - appnet
networks:
  appnet:
    driver: bridge
