version: '3'
services:
  app:
    image: ghcr.io/consenti-ai/blocksee-sales-agent@sha256:60a8d43c37c27f9b5b4e8028709135f47480f1744f5022a6218c8c16a0e0b6ec
    env_file:
      - .env.secretvm
    networks:
      - appnet
  traefik:
    image: traefik:v2.10
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.options=default@file
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - /mnt/secure/cert:/certs:ro
      - ./usr/dynamic-config.yml:/etc/traefik/dynamic/dynamic-config.yml:ro
    networks:
      - appnet
networks:
  appnet:
    driver: bridge
