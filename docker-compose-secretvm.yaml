# Deploy with: secretvm-cli vm create -n <vm-name> -t small -s \
#              -d docker-compose-secretvm.yaml -e .env.secretvm
#
# IMAGE is a placeholder — replace with the real pushed image (by digest,
# not `latest`, so the running VM's measurement is pinned and verifiable)
# after `docker build` + `docker push` to your registry.

version: '3'
services:
  app:
    image: REPLACE_ME/blocksee-sales-agent@sha256:REPLACE_ME_WITH_REAL_DIGEST
    ports:
      - '3000'
    env_file:
      - .env.secretvm
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`$DOMAIN_NAME`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls=true
      - traefik.http.services.app.loadbalancer.server.port=3000
  traefik:
    image: traefik:v2.10
    command:
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.options=default@file
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/secure/cert:/certs:ro
    networks:
      - traefik
    configs:
      - source: tls_config
        target: /etc/traefik/dynamic/tls.yml
networks:
  traefik:
    driver: bridge
configs:
  tls_config:
    content: |-
      tls:
        certificates:
          - certFile: /certs/secret_vm_fullchain.pem
            keyFile: /certs/secret_vm_private.pem
        stores:
          default:
            defaultCertificate:
              certFile: /certs/secret_vm_fullchain.pem
              keyFile: /certs/secret_vm_private.pem
