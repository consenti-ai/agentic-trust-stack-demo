# Deploy via the SecretVM dashboard, or CLI:
#   secretvm-cli vm create -n <vm-name> -t small -s \
#     -d docker-compose-secretvm.yaml -e .env.secretvm
#
# Simplified from an earlier version that bundled its own Traefik reverse
# proxy + a top-level `configs:` block — that tripped the SecretVM dashboard's
# compose parser ("r.get is not a function"). SecretVM appears to handle
# TLS/domain routing at the platform level (its own form says leaving
# "Custom Domain" empty uses "the default domain provided by the system"),
# so the app doesn't need to run its own reverse proxy.

version: '3'
services:
  app:
    image: ghcr.io/consenti-ai/blocksee-sales-agent@sha256:51a40c6d8464c57cdff7e6f4ae3946f2069a902c8ee915ec112f500927e1291a
    ports:
      - '3000'
    env_file:
      - .env.secretvm
