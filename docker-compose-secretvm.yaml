# Deploy via the SecretVM dashboard, or CLI:
#   secretvm-cli vm create -n <vm-name> -t small -s \
#     -d docker-compose-secretvm.yaml -e .env.secretvm
#
# Requires uploading secretvm-files/additional-files.tar in the "Additional
# Files" field — it unpacks to ./usr/tls.yml, which Traefik mounts below.
#
# History: an earlier version put this same TLS config in a top-level
# `configs:` block, which crashed the SecretVM dashboard's compose parser
# ("r.get is not a function"). Removing Traefik entirely "fixed" that error
# but also removed the only thing listening on 443 — the assigned domain
# resolves, but nothing answers HTTPS without a reverse proxy. This version
# keeps Traefik, just delivers its TLS config via a real mounted file instead
# of the `configs:` YAML feature.

version: '3'
services:
  app:
    image: ghcr.io/consenti-ai/blocksee-sales-agent@sha256:949214348a45e311a8f3a5f36b04e3e048f32db104341214449b770f478e582f
    ports:
      - '3000'
    env_file:
      - .env.secretvm
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`$DOMAIN_NAME`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls=true
      - traefik.http.services.app.loadbalancer.server.port=3000
  traefik:
    image: traefik:v2.10
    command:
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.options=default@file
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/secure/cert:/certs:ro
      - ./usr/tls.yml:/etc/traefik/dynamic/tls.yml:ro
    networks:
      - traefik
networks:
  traefik:
    driver: bridge
